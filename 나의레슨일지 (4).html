        @keyframes sbaspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

        :root {
          --bg: #f7f7fb; --surface: #ffffff; --surface2: #f9fafb; --surface3: #f3f4f6;
          --border: #f0f0f5; --border2: #e5e7eb;
          --text: #1f2937; --text-sub: #6b7280; --text-muted: #9ca3af;
          --accent: #6366f1; --accent-bg: #eef2ff; --accent-dim: #4f46e5;
          --input-bg: #fafafa; --input-border: #e5e7eb;
          --header-bg: linear-gradient(135deg,#6366f1 0%,#7c3aed 100%);
          --card-bg: #ffffff; --card-border: #f0f0f5;
          --modal-bg: #ffffff; --overlay: rgba(15,15,35,0.6);
          --green: #10b981; --green-bg: #f0fdf4; --green-text: #065f46;
          --red: #ef4444; --red-bg: #fef2f2; --red-text: #b91c1c;
          --amber: #f59e0b; --amber-bg: #fffbeb; --amber-text: #92400e;
          --blue: #3b82f6; --blue-bg: #eff6ff; --blue-text: #1e40af;
          --purple-bg: #f5f3ff; --purple-text: #7c3aed;
          --drum-bg: #ffffff; --drum-hl: #eef2ff; --drum-grad: rgba(255,255,255,;
          --menu-bg: #ffffff; --menu-border: #f3f4f6; --menu-text: #1f2937;
          --scroll-thumb: rgba(0,0,0,0.15);
          --tab-active-color: #6366f1;
        }
        [data-theme="dark"] {
          --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f; --surface3: #2a2a3a;
          --border: #2e2e40; --border2: #3a3a50;
          --text: #e8e8f0; --text-sub: #9090b0; --text-muted: #555570;
          --accent: #818cf8; --accent-bg: #1e1e3a; --accent-dim: #6366f1;
          --input-bg: #22222f; --input-border: #3a3a50;
          --header-bg: linear-gradient(135deg,#312e81 0%,#4c1d95 100%);
          --card-bg: #1a1a24; --card-border: #2e2e40;
          --modal-bg: #1a1a24; --overlay: rgba(0,0,0,0.82);
          --green: #34d399; --green-bg: #042e1a; --green-text: #6ee7b7;
          --red: #f87171; --red-bg: #1f0a0a; --red-text: #fca5a5;
          --amber: #fbbf24; --amber-bg: #1c1202; --amber-text: #fde68a;
          --blue: #60a5fa; --blue-bg: #0c1829; --blue-text: #93c5fd;
          --purple-bg: #1e1232; --purple-text: #c4b5fd;
          --drum-bg: #1a1a24; --drum-hl: #1e1e3a; --drum-grad: rgba(26,26,36,;
          --menu-bg: #22222f; --menu-border: #2e2e40; --menu-text: #e8e8f0;
          --scroll-thumb: rgba(255,255,255,0.1);
          --tab-active-color: #818cf8;
        }

        body, html { background: var(--bg) !important; color: var(--text); transition: background 0.25s, color 0.25s; }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }

        /* 전역 카드 */
        .t-card {
          background: var(--card-bg) !important;
          border-color: var(--card-border) !important;
          color: var(--text) !important;
        }
        .t-surface { background: var(--surface) !important; }
        .t-surface2 { background: var(--surface2) !important; }
        .t-surface3 { background: var(--surface3) !important; }
        .t-text { color: var(--text) !important; }
        .t-text-sub { color: var(--text-sub) !important; }
        .t-text-muted { color: var(--text-muted) !important; }
        .t-border { border-color: var(--border) !important; }
        .t-border2 { border-color: var(--border2) !important; }
        .t-accent { color: var(--accent) !important; }
        .t-input {
          background: var(--input-bg) !important;
          border-color: var(--input-border) !important;
          color: var(--text) !important;
        }
        .t-input::placeholder { color: var(--text-muted) !important; }
        .t-input:focus { border-color: var(--accent) !important; background: var(--surface) !important; }

        /* 앱 전체 래퍼 */
        .app-wrap { background: var(--bg); min-height: 100vh; }

        /* 헤더 */
        .app-header { background: var(--header-bg); transition: none !important; }

        /* 탭바 */
        .app-tabbar {
          background: var(--surface);
          border-bottom: 1.5px solid var(--border);
        }
        .app-tab { color: var(--text-muted); border-bottom: 2.5px solid transparent; }
        .app-tab.active { color: var(--tab-active-color); border-bottom-color: var(--tab-active-color); }

        /* 카드 */
        .app-card {
          background: var(--card-bg);
          border: 1.5px solid var(--card-border);
          box-shadow: 0 2px 8px rgba(0,0,0,0.04);
          border-radius: 16px;
          transition: background 0.25s, border-color 0.25s;
        }
        [data-theme="dark"] .app-card { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        /* 모달 */
        .app-modal-inner {
          background: var(--modal-bg) !important;
          color: var(--text) !important;
          border: 1px solid var(--border);
        }
        [data-theme="dark"] .app-modal-inner { box-shadow: 0 24px 64px rgba(0,0,0,0.6) !important; }

        /* 드롭다운 메뉴 */
        .app-menu {
          background: var(--menu-bg) !important;
          border: 1px solid var(--border) !important;
        }
        .app-menu-item { color: var(--menu-text) !important; border-bottom-color: var(--border) !important; }
        .app-menu-item:hover { background: var(--surface2) !important; }

        /* 입력창 */
        .app-input {
          background: var(--input-bg);
          border: 1.5px solid var(--input-border);
          color: var(--text);
          border-radius: 10px;
          width: 100%; padding: 10px 13px;
          font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
          outline: none; box-sizing: border-box;
          transition: border 0.2s, background 0.2s;
        }
        .app-input::placeholder { color: var(--text-muted); }
        .app-input:focus { border-color: var(--accent); background: var(--surface); }

        /* 검색 입력 */
        .search-input {
          flex: 1; padding: 10px 14px; border-radius: 12px;
          border: 1.5px solid var(--input-border);
          font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
          background: var(--surface); color: var(--text); outline: none;
          transition: border 0.2s, background 0.2s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); }

        /* 섹션 레이블 */
        .app-label { color: var(--text-sub) !important; }

        /* SyncBar 상태별 bg */
        .syncbar-ok    { background: var(--green-bg); border-bottom: 1px solid color-mix(in srgb, var(--green) 30%, transparent); }
        .syncbar-error { background: var(--red-bg);   border-bottom: 1px solid color-mix(in srgb, var(--red) 30%, transparent); }
        .syncbar-syncing { background: var(--accent-bg); border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
        .syncbar-idle  { background: var(--surface2); border-bottom: 1px solid var(--border); }

        /* 드럼 휠 */
        .drum-container {
          background: var(--drum-bg);
          border: 1.5px solid var(--accent-bg);
          border-radius: 14px; overflow: hidden;
          transition: background 0.25s;
        }
        [data-theme="dark"] .drum-container { border-color: var(--border2); }
        .drum-col { border-right: 1px solid var(--border); }
        .drum-col:last-child { border-right: none; }
        .drum-highlight { background: var(--drum-hl) !important; }

        /* 달력 */
        .cal-nav-btn { background: var(--surface3) !important; color: var(--text) !important; }
        .cal-day { color: var(--text); }
        .cal-day.other-month { color: var(--text-muted); }
        .cal-day.today { background: var(--accent) !important; color: #fff !important; }
        .cal-day-cell { border-bottom: 1px solid var(--border); }

        /* 뱃지/태그 */
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-red   { background: var(--red-bg);   color: var(--red); }
        .badge-amber { background: var(--amber-bg); color: var(--amber); }
        .badge-blue  { background: var(--blue-bg);  color: var(--blue); }
        .badge-accent{ background: var(--accent-bg);color: var(--accent); }

        /* 다크모드 전환 애니메이션 */
        *, *::before, *::after { transition: background-color 0.2s, border-color 0.2s, color 0.15s; }
        /* 헤더는 그라데이션이라 background-color transition 제외 */
        .app-header, .app-header * { transition: color 0.15s !important; }
        /* transition 예외 - 애니메이션 깜빡임 방지 */
        .no-transition, .no-transition * { transition: none !important; }
