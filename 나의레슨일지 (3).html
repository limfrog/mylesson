    var _isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (_isIOS && !window.navigator.standalone && !sessionStorage.getItem('ios-hint')) {
      sessionStorage.setItem('ios-hint','1');
      var ko2 = navigator.language.startsWith('ko');
      setTimeout(function(){
        var h = document.createElement('div');
        h.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:14px 18px;border-radius:14px;font-size:12px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.35);z-index:9999;max-width:84%;line-height:1.8;';
        h.innerHTML = ko2
          ? '홈 화면에 추가하면 앱처럼 사용할 수 있어요!<br>Safari 공유버튼 → <strong>홈 화면에 추가</strong><br><button onclick="this.parentElement.remove()" style="margin-top:8px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 16px;border-radius:8px;cursor:pointer;">닫기</button>'
          : 'Tap Share → <strong>Add to Home Screen</strong><br><button onclick="this.parentElement.remove()" style="margin-top:8px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 16px;border-radius:8px;cursor:pointer;">Close</button>';
        document.body.appendChild(h);
        setTimeout(function(){ if(h.parentElement) h.remove(); }, 8000);
      }, 2500);
    }
    if ('serviceWorker' in navigator) {
      var sw = "const C='l5';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).then(r=>{const rc=r.clone();caches.open(C).then(c=>c.put(e.request,rc));return r;}).catch(()=>caches.match(e.request)));}));";
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
    }
